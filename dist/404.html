<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <meta name="description" content="65 天 RF、EMC、安全與驗證工程英文學習平台">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RF Academy">
  <title>RF Academy Pro</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <a class="skip-link" href="#app">跳到主要內容</a>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="#dashboard" aria-label="RF Academy Pro 首頁">
        <span class="brand-mark" aria-hidden="true">RF</span>
        <span><strong>RF Academy</strong><small>PRO · 65 DAY LAB ENGLISH</small></span>
      </a>
      <div class="top-actions">
        <span id="networkBadge" class="network-badge" role="status">ONLINE</span>
        <button id="themeToggle" class="icon-button" type="button" aria-label="切換淺色或深色模式">☀</button>
      </div>
    </header>

    <main id="app" tabindex="-1" aria-live="polite">
      <section id="loadingView" class="loading-view">
        <div class="loader" aria-hidden="true"></div>
        <p>正在準備今天的 15 分鐘課程…</p>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="主要導覽">
      <a href="#dashboard" data-route="dashboard"><span aria-hidden="true">⌂</span><small>首頁</small></a>
      <a href="#lesson" data-route="lesson"><span aria-hidden="true">◫</span><small>課程</small></a>
      <a href="#interview" data-route="interview"><span aria-hidden="true">◎</span><small>面試</small></a>
      <a href="#debug" data-route="debug"><span aria-hidden="true">⚙</span><small>除錯</small></a>
      <a href="#progress" data-route="progress"><span aria-hidden="true">↗</span><small>進度</small></a>
    </nav>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script>
    (() => {
      const loadingText = '正在準備今天的 15 分鐘課程…';
      let finished = false;
      let timer;

      function showBootstrapError(message) {
        if (finished) return;
        finished = true;
        clearTimeout(timer);
        const mount = document.querySelector('#app');
        if (!mount) return;
        mount.innerHTML = '';
        const section = document.createElement('section');
        section.className = 'view empty-state';
        const title = document.createElement('h1');
        title.textContent = '首頁初始化失敗';
        const detail = document.createElement('p');
        detail.textContent = message;
        const action = document.createElement('button');
        action.className = 'primary-button';
        action.type = 'button';
        action.textContent = '清除舊快取並重新載入';
        action.addEventListener('click', async () => {
          action.disabled = true;
          action.textContent = '正在修復快取…';
          try {
            const registration = 'serviceWorker' in navigator
              ? await navigator.serviceWorker.getRegistration('./')
              : null;
            if (registration) await registration.unregister();
            if ('caches' in window) {
              const keys = await caches.keys();
              await Promise.all(keys.filter(key => key.startsWith('rf-academy-')).map(key => caches.delete(key)));
            }
          } finally {
            location.reload();
          }
        });
        section.append(title, detail, action);
        mount.append(section);
      }

      window.RFAcademyBoot = {
        started() {
          if (finished) return;
          finished = true;
          clearTimeout(timer);
          document.documentElement.dataset.appStarted = 'true';
        },
        failed(error) {
          const reason = error && error.message ? error.message : String(error || '應用程式模組未能載入。');
          showBootstrapError(reason);
        }
      };

      if ('serviceWorker' in navigator && location.protocol !== 'file:') {
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          const reloadKey = 'rf-academy-sw-reloaded';
          const lastReload = Number(sessionStorage.getItem(reloadKey) || 0);
          if (Date.now() - lastReload < 5000) return;
          sessionStorage.setItem(reloadKey, String(Date.now()));
          location.reload();
        });
      }

      if (location.protocol === 'file:') {
        timer = setTimeout(() => showBootstrapError('瀏覽器禁止直接從本機檔案載入 ES 模組與課程 JSON。請執行 START_RF_ACADEMY.bat，以 HTTP 模式開啟完整首頁。'), 0);
      } else {
        timer = setTimeout(() => showBootstrapError(`載入逾時。頁面仍停在「${loadingText}」，表示應用程式模組尚未成功執行。`), 10000);
      }
    })();
  </script>
  <script type="module" src="./js/app.js" onerror="window.RFAcademyBoot.failed(new Error('app.js 或其相依模組載入失敗。'))"></script>
</body>
</html>
